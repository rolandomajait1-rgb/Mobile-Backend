<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
</head>
<body>
    <h1>Backend API Test</h1>
    <button onclick="testHealth()">Test Health Check</button>
    <button onclick="testCategories()">Test Categories (No Auth)</button>
    <button onclick="testLogin()">Test Login</button>
    <pre id="result"></pre>

    <script>
        const API_URL = 'https://mobile-backend-84tg.onrender.com';
        const result = document.getElementById('result');

        async function testHealth() {
            result.textContent = 'Testing health check...';
            try {
                const response = await fetch(`${API_URL}/up`);
                const data = await response.text();
                result.textContent = `Status: ${response.status}\n\n${data}`;
            } catch (error) {
                result.textContent = `Error: ${error.message}`;
            }
        }

        async function testCategories() {
            result.textContent = 'Testing categories...';
            try {
                const response = await fetch(`${API_URL}/api/categories`, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                });
                const data = await response.json();
                result.textContent = `Status: ${response.status}\n\n${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                result.textContent = `Error: ${error.message}`;
            }
        }

        async function testLogin() {
            result.textContent = 'Testing login...';
            try {
                const response = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'test@laverdad.edu.ph',
                        password: 'password123'
                    })
                });
                const data = await response.json();
                result.textContent = `Status: ${response.status}\n\n${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                result.textContent = `Error: ${error.message}`;
            }
        }
    </script>
</body>
</html>
